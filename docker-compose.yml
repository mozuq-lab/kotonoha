version: '3.8'

services:
  postgres:
    build: ./docker/postgres
    container_name: kotonoha_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kotonoha_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-kotonoha_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - kotonoha_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kotonoha_user} -d ${POSTGRES_DB:-kotonoha_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    # 開発用 Dockerfile（--reload 有効・ボリュームマウント前提）。
    # 本番イメージはマルチステージ・非 root の backend/Dockerfile を使用する。
    build:
      context: .
      dockerfile: ./docker/backend/Dockerfile
    container_name: kotonoha_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-kotonoha_user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@postgres:5432/${POSTGRES_DB:-kotonoha_db}
      TEST_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-kotonoha_user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@postgres:5432/kotonoha_test
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set in .env}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kotonoha_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  kotonoha_network:
    driver: bridge
